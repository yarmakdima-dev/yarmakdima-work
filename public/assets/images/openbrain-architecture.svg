<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
	<title id="title">High-level architecture diagram of OpenBrain</title>
	<desc id="desc">OpenBrain connects capture surfaces, core services, proactive routines, and external LLMs into a private AI memory system.</desc>
	<style>
		text {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			fill: #1f2933;
		}

		.label {
			font-size: 18px;
			font-weight: 650;
		}

		.detail {
			font-size: 14px;
			fill: #4b5563;
		}

		.box {
			fill: #ffffff;
			stroke: #b8c2cc;
			stroke-width: 2;
		}

		.group {
			fill: #f6f8fa;
			stroke: #d5dde5;
			stroke-width: 2;
		}

		.flow {
			fill: none;
			stroke: #6b7280;
			stroke-width: 2.5;
			marker-end: url(#arrow);
		}
	</style>
	<defs>
		<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280" />
		</marker>
	</defs>
	<rect width="960" height="520" rx="0" fill="#ffffff" />

	<rect class="group" x="40" y="56" width="210" height="408" rx="6" />
	<text class="label" x="72" y="98">Capture surfaces</text>
	<rect class="box" x="72" y="134" width="146" height="78" rx="6" />
	<text class="label" x="104" y="166">Telegram</text>
	<text class="detail" x="92" y="190">Text + voice,</text>
	<text class="detail" x="92" y="208">multilingual input</text>
	<rect class="box" x="72" y="258" width="146" height="78" rx="6" />
	<text class="label" x="103" y="291">Manual notes</text>
	<text class="detail" x="94" y="315">Ideas, tasks,</text>
	<text class="detail" x="94" y="333">reflections</text>

	<rect class="group" x="318" y="56" width="324" height="408" rx="6" />
	<text class="label" x="397" y="98">OpenBrain core</text>
	<rect class="box" x="374" y="128" width="212" height="66" rx="6" />
	<text class="label" x="421" y="159">Capture API</text>
	<text class="detail" x="415" y="181">Normalize inputs</text>
	<rect class="box" x="374" y="226" width="212" height="66" rx="6" />
	<text class="label" x="415" y="257">Private database</text>
	<text class="detail" x="417" y="279">Memory and context</text>
	<rect class="box" x="374" y="324" width="212" height="66" rx="6" />
	<text class="label" x="421" y="355">Auto-tagging</text>
	<text class="detail" x="428" y="377">Structure and recall</text>

	<rect class="group" x="710" y="56" width="210" height="408" rx="6" />
	<text class="label" x="744" y="98">Outputs and AI</text>
	<rect class="box" x="744" y="124" width="142" height="58" rx="6" />
	<text class="label" x="770" y="151">LLM interface</text>
	<text class="detail" x="763" y="171">Think with data</text>
	<rect class="box" x="744" y="210" width="142" height="58" rx="6" />
	<text class="label" x="767" y="237">External LLMs</text>
	<text class="detail" x="766" y="257">Rented intelligence</text>
	<rect class="box" x="744" y="296" width="142" height="58" rx="6" />
	<text class="label" x="769" y="323">Google Sheets</text>
	<text class="detail" x="770" y="343">Inspect visually</text>
	<rect class="box" x="744" y="382" width="142" height="58" rx="6" />
	<text class="label" x="752" y="409">Proactive routines</text>
	<text class="detail" x="762" y="429">Briefings and patterns</text>

	<path class="flow" d="M 218 173 C 270 173 306 161 374 161" />
	<path class="flow" d="M 218 297 C 278 297 312 259 374 259" />
	<path class="flow" d="M 480 194 L 480 226" />
	<path class="flow" d="M 480 292 L 480 324" />
	<path class="flow" d="M 586 259 C 650 259 674 153 744 153" />
	<path class="flow" d="M 586 259 C 650 259 674 239 744 239" />
