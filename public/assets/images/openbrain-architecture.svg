<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="640" viewBox="0 0 1040 640" role="img" aria-labelledby="title desc">
	<title id="title">High-level architecture diagram of OpenBrain</title>
	<desc id="desc">OpenBrain connects Telegram capture, core services on a VPS, a private database, proactive routines, Google Sheets, an LLM interface, and external model providers.</desc>
	<style>
		text {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			fill: #18212f;
		}

		.kicker {
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			fill: #5a6778;
		}

		.label {
			font-size: 18px;
			font-weight: 700;
		}

		.detail {
			font-size: 14px;
			fill: #536171;
		}

		.small {
			font-size: 12px;
			fill: #6b7280;
		}

		.panel {
			fill: #f7f8fa;
			stroke: #d6dee7;
			stroke-width: 2;
		}

		.service {
			fill: #ffffff;
			stroke: #aeb9c6;
			stroke-width: 2;
		}

		.memory {
			fill: #eef6f2;
			stroke: #8fb7a1;
			stroke-width: 2;
		}

		.model {
			fill: #f4f1fb;
			stroke: #b4a3d1;
			stroke-width: 2;
		}

		.routine {
			fill: #fff7ed;
			stroke: #d7a665;
			stroke-width: 2;
		}

		.flow {
			fill: none;
			stroke: #657386;
			stroke-width: 2.4;
			marker-end: url(#arrow);
		}

		.flow-light {
			fill: none;
			stroke: #98a3b3;
			stroke-width: 1.8;
			marker-end: url(#arrow-light);
		}
	</style>
	<defs>
		<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#657386" />
		</marker>
		<marker id="arrow-light" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#98a3b3" />
		</marker>
	</defs>

	<rect width="1040" height="640" fill="#ffffff" />
	<text class="kicker" x="48" y="48">OpenBrain architecture</text>
	<text class="detail" x="48" y="72">Private memory system: capture everything, keep the data, rent the intelligence.</text>

	<rect class="panel" x="48" y="112" width="220" height="420" rx="8" />
	<text class="kicker" x="78" y="150">Capture</text>
	<rect class="service" x="78" y="178" width="160" height="96" rx="8" />
	<text class="label" x="116" y="214">Telegram</text>
	<text class="detail" x="102" y="240">Text + voice</text>
	<text class="detail" x="96" y="262">multilingual input</text>
	<rect class="service" x="78" y="318" width="160" height="86" rx="8" />
	<text class="label" x="108" y="354">Notes</text>
	<text class="detail" x="102" y="380">Ideas, tasks,</text>
	<text class="detail" x="102" y="402">reflections</text>
	<text class="small" x="86" y="474">Low-friction capture is the</text>
	<text class="small" x="86" y="492">front door to the system.</text>

	<rect class="panel" x="338" y="112" width="330" height="420" rx="8" />
	<text class="kicker" x="430" y="150">OpenBrain core / VPS</text>
	<rect class="service" x="384" y="178" width="238" height="72" rx="8" />
	<text class="label" x="447" y="211">Bot + API</text>
	<text class="detail" x="430" y="234">Receive and normalize inputs</text>
	<rect class="memory" x="384" y="288" width="238" height="82" rx="8" />
	<text class="label" x="429" y="322">Private database</text>
	<text class="detail" x="419" y="346">Own the memory and context</text>
	<rect class="service" x="384" y="408" width="238" height="72" rx="8" />
	<text class="label" x="430" y="441">Tagging + search</text>
	<text class="detail" x="425" y="464">Structure for future recall</text>

	<rect class="model" x="724" y="112" width="250" height="126" rx="8" />
	<text class="kicker" x="770" y="150">External model layer</text>
	<text class="label" x="770" y="184">External LLMs</text>
	<text class="detail" x="762" y="210">Rent the intelligence;</text>
	<text class="detail" x="762" y="232">keep the architecture.</text>

	<rect class="panel" x="724" y="284" width="250" height="248" rx="8" />
	<text class="kicker" x="786" y="322">Interfaces</text>
	<rect class="service" x="760" y="348" width="178" height="58" rx="8" />
	<text class="label" x="800" y="382">LLM interface</text>
	<rect class="service" x="760" y="438" width="178" height="58" rx="8" />
	<text class="label" x="800" y="472">Google Sheets</text>

	<rect class="routine" x="338" y="560" width="636" height="54" rx="8" />
	<text class="kicker" x="372" y="593">Proactive routines</text>
	<text class="detail" x="542" y="593">Morning briefing, weekly reflection, pattern surfacing</text>

	<path class="flow" d="M 238 226 C 288 226 324 214 384 214" />
	<path class="flow" d="M 238 360 C 294 360 326 329 384 329" />
	<path class="flow" d="M 503 250 L 503 288" />
	<path class="flow" d="M 503 370 L 503 408" />
	<path class="flow" d="M 622 214 C 672 214 686 175 724 175" />
	<path class="flow" d="M 622 329 C 690 329 700 377 760 377" />
	<path class="flow" d="M 622 329 C 690 329 700 467 760 467" />
	<path class="flow-light" d="M 503 480 L 503 560" />
	<path class="flow-light" d="M 724 175 C 684 255 664 448 622 448" />
	<path class="flow-light" d="M 656 560 C 722 540 764 510 818 496" />
</svg>
